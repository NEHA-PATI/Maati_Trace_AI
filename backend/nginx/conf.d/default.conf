# Reverse proxy in front of api_gateway_service.
# api_gateway_service is the single public entry point; all other
# 15 services stay internal-only on the maatitrace_network.

upstream api_gateway {
    server api_gateway_service:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Uncomment once TLS certs are mounted at /etc/nginx/certs to force HTTPS.
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    location /health {
        access_log off;
        proxy_pass http://api_gateway;
    }

    location / {
        limit_req zone=api_gateway_limit burst=40 nodelay;

        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
}

